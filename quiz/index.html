<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Decode Alice Eduarda:<br>O futuro do seu time! 🖥️</title>
<link rel="stylesheet" href="css/style.css">


</head>
<body>

<div class="container">
    <h2 id="title">Quiz Decode Alice Eduarda:<br>O futuro do seu time! 🖥️</h2>

    <p id="progress"></p>

    <div class="progress-bar" id="progressBar">
        <div class="progress-fill" id="progressFill"></div>
    </div>

    <p id="question">Clique no botão abaixo para começar!</p>

    <div id="options"></div>

    <p id="feedback"></p>

    <button id="startBtn" onclick="startQuiz()">Começar Quiz</button>
    <button id="nextBtn" onclick="nextQuestion()">Próxima Pergunta</button>
    <button id="restartBtn" onclick="restartQuiz()">Reiniciar Quiz</button>

    <p id="finalMessage"></p>
    <button id="linkedinBtn" onclick="window.location.href='https://www.linkedin.com/in/aliceeduarda-mth'">Ir para o LinkedIn</button>
    <button id="githubBtn" onclick="window.location.href='https://github.com/aliceeduarda'">Ir para o Github</button>
    <button id="portfolioBtn" onclick="window.location.href='../index.html'">Voltar ao Portfólio</button>
</div>


<script src="js/script.js"></script>

</body>
</html>
